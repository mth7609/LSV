<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap5 Range Min and Max</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" />
</head>

<body>
    <div class="container">
        <div class="mt-5">
            <h1 class="text-success text-center">
                GeeksforGeeks
            </h1>
            <h4 class="text-center">
                Bootstrap5 Range Min and Max
            </h4>
        </div>

        <input id="range1" min="5" max="10" type="range" class="form-range" />
        <h4>
            Current Value:
            <span id="curr"></span>
        </h4>
    </div>

    <script>
        var el = document.getElementById('curr');
        var r = document.getElementById('range1');
        el.innerText = r.valueAsNumber;
        r.addEventListener('change', () => {
            el.innerText = r.valueAsNumber;
        }) 
    </script>
</body>

</html>
