<!DOCTYPE html>
<html lang="en">
<head>
    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
          rel="stylesheet" />
    <script src=
"https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js">
    </script>
      <title>Bootstrap 5 Dropdowns Via JavaScript</title>
</head>

<body>
    <h1 class="m-4 text-success">
          GeeksforGeeks
      </h1>
    <h4 class="ms-4">
          Bootstrap 5 Dropdowns Via JavaScript
      </h4>
    <div class="container mt-4">
        <div class="dropdown">
            <button class="btn btn-success dropdown-toggle" 
                    type="button" data-bs-toggle="dropdown">
                Dropdown button
            </button>
            <ul class="dropdown-menu">
                <li>
                    <p>
                        <abbr title="Cascading Styling Sheets" 
                              class="ms-2"> CSS 
                          </abbr>
                    </p>
                </li>
                <li>
                    <p>
                        <abbr title="HyperText Markup Language" 
                              class="ms-2"> HTML 
                          </abbr>
                    </p>
                </li>
                <li>
                    <p>
                        <abbr title="JavaScript" 
                              class="ms-2"> 
                              JS 
                          </abbr>
                    </p>
                </li>
            </ul>
        </div>
    </div>
    <script>
        let toggleBtn = document.getElementsByClassName('.dropdown-toggle')
        let dropdownEl= new bootstrap.Dropdown(toggleBtn);
        dropdownEl.show();
    </script>
</body>
  
</html>
