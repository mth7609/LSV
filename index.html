<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archive der Jugendzeitschrifter</title>
    <link href="node_modules\bootstrap\dist\css\bootstrap.css" rel="stylesheet" crossorigin="anonymous" />
</head>
<body>
<div class="container col-xxl-18 px-4 py-3">
    <form method="POST" class="p-4 p-md-3 border rounded-4 bg-body-secondary">
        <div class="form-group row">
            <div class="col-sm-3">
                <label for="text" class="col-sm-2 col-form-label">Name</label>
                <input type="text" class="form-control" id="name">
            </div>
            <div class="col-sm-1">
                <label for="text" class="col-sm-2 col-form-label">Nr.</label>
                <input type="text" class="form-control" id="nr">
            </div>
            <div class="col-sm-1">
                <label for="text" class="col-sm-2 col-form-label">Jahr</label>
                <input type="text" class="form-control" id="jahr">
            </div>
            <div class="col-sm-1">
                <label for="text" class="col-sm-2 col-form-label"></label>
            </div>
            <div class="col-sm-3">
                <label for="text" class="col-sm-2 col-form-label">Ort</label>
                <input type="text" class="form-control" id="ort">
            </div>
        </div>
        <div class="form-group row">
            <div class="col-sm-3">
                <label for="text" class="col-sm-2 col-form-label">
                    <nobr>Schule / Herausgeber</nobr>
                </label>
                <input type="text" class="form-control" id="schuleHerausgeber">
            </div>
            <div class="col-sm-3" role="group" aria-label="Basic radio toggle button group">
                <div class="col-sm-3">
                    <label for="text" class="col-sm-2 col-form-label">Herausgeber</label>
                </div>
                <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off">
                <label class="btn btn-outline-primary" for="btnradio1">Schule</label>&nbsp;&nbsp;&nbsp;
                <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                <label class="btn btn-outline-primary" for="btnradio2">
                    <nobr>&nbsp; Frei&nbsp;&nbsp;</nobr>
                </label>
            </div>
            <div class="col-sm-2">
                <label for="text" class="col-sm-2 col-form-label">Land</label>
                <input type="text" class="form-control" id="land">
            </div>
        </div>
    </form>
</div>
